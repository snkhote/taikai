<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="description" content="大会運営速報">
<meta http-equiv="refresh" content="30">
<title>大会運営速報</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; background: #111; overflow: hidden; font-family: 'Meiryo', sans-serif; }
  .header { position: fixed; top: 0; left: 0; right: 0; height: 34px; background: rgba(0,0,0,0.8); display: flex; align-items: center; justify-content: space-between; padding: 0 16px; z-index: 10; }
  .header-title { color: #f0c040; font-size: 16px; }
  .header-info { color: #888; font-size: 11px; }
  .slide { position: fixed; top: 34px; left: 0; right: 0; bottom: 60px; display: none; align-items: flex-start; justify-content: center; background: #111; overflow-y: auto; }
  .slide.active { display: flex; }
  .slide img { width: 100%; height: auto; display: block; }
  .footer { position: fixed; bottom: 0; left: 0; right: 0; height: 60px; background: rgba(0,0,0,0.85); display: flex; align-items: center; justify-content: center; gap: 20px; z-index: 10; }
  .dot { width: 10px; height: 10px; background: #555; border-radius: 50%; cursor: pointer; display: inline-block; }
  .dot.active { background: #f0c040; }
  .footer button { background: #f0c040; color: #111; border: none; padding: 10px 40px; font-size: 20px; font-weight: bold; cursor: pointer; border-radius: 8px; }
  .footer button:hover { background: #ffd700; }
  .page-info { color: #f0c040; font-size: 16px; font-weight: bold; min-width: 70px; text-align: center; }
</style>
</head>
<body>
<div class="header">
  <span class="header-title">大会運営速報システム　保手濱モデル</span>
  <span class="header-info">更新：2026年05月06日 17:21:51</span>
</div>

<div class="slide">
  <img src="img/0_呉市民スポーツ大会_出力101.png?t=20260506172151" alt="出力101" />
</div><div class="slide">
  <img src="img/1_呉市民スポーツ大会_出力102.png?t=20260506172151" alt="出力102" />
</div>

<div class="footer">
  <button onclick="prev()">◀ 前へ</button>
  <span class="page-info" id="pageInfo">1 / 2</span>
  <span class='dot' onclick='goTo(0)'></span>
<span class='dot' onclick='goTo(1)'></span>

  <button onclick="next()">次へ ▶</button>
</div>

<script>
var current = 0;
var total = 2;
function goTo(n) {
  document.querySelectorAll('.slide')[current].classList.remove('active');
  document.querySelectorAll('.dot')[current].classList.remove('active');
  current = (n + total) % total;
  document.querySelectorAll('.slide')[current].classList.add('active');
  document.querySelectorAll('.dot')[current].classList.add('active');
  document.getElementById('pageInfo').textContent = (current+1) + ' / ' + total;
}
function next() { goTo(current + 1); }
function prev() { goTo(current - 1); }
document.querySelectorAll('.slide')[0].classList.add('active');
document.querySelectorAll('.dot')[0].classList.add('active');
</script>
</body>
</html>
