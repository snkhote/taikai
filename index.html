<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta http-equiv="refresh" content="20">
<title>大会運営速報</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #111; color: #fff; font-family: 'Meiryo', sans-serif; }
  h1 { text-align: center; color: #f0c040; font-size: 24px; padding: 10px 0 4px; }
  .updated { text-align: center; color: #888; font-size: 12px; margin-bottom: 8px; }
  .label { text-align: center; color: #f0c040; font-size: 16px; margin-bottom: 6px; }
  .slide img { display: block; margin: 0 auto; max-width: 100%; max-height: 80vh; }
  .dots { text-align: center; padding: 10px 0; }
  .dot { display: inline-block; width: 10px; height: 10px; background: #555;
         border-radius: 50%; margin: 0 4px; cursor: pointer; }
  .dot.active { background: #f0c040; }
  .nav { text-align: center; margin-top: 8px; }
  .nav button { background: #333; color: #fff; border: 1px solid #555;
                padding: 6px 20px; margin: 0 6px; font-size: 14px; cursor: pointer;
                border-radius: 4px; }
  .nav button:hover { background: #555; }
</style>
</head>
<body>
<h1>大会運営速報システム　保手濱モデル</h1>
<p class="updated">更新：2026年05月06日 10:19:26</p>
<div class="slide" style="display:block;">
  <p class="label">出力101　1 / 2</p>
  <img src="img/呉市民スポーツ大会_出力101.png" alt="出力101" />
</div><div class="slide" style="display:none;">
  <p class="label">出力102　2 / 2</p>
  <img src="img/呉市民スポーツ大会_出力102.png" alt="出力102" />
</div>
<div class="dots">
<span class='dot' onclick='goTo(0)'></span>
<span class='dot' onclick='goTo(1)'></span>

</div>
<div class="nav">
  <button onclick="prev()">◀ 前へ</button>
  <button onclick="next()">次へ ▶</button>
</div>
<script>
var current = 0;
var total = 2;
var timer;
function goTo(n) {
  document.querySelectorAll('.slide')[current].style.display = 'none';
  document.querySelectorAll('.dot')[current].classList.remove('active');
  current = (n + total) % total;
  document.querySelectorAll('.slide')[current].style.display = 'block';
  document.querySelectorAll('.dot')[current].classList.add('active');
  resetTimer();
}
function next() { goTo(current + 1); }
function prev() { goTo(current - 1); }
function resetTimer() {
  clearInterval(timer);
  timer = setInterval(function(){ goTo(current + 1); }, 15000);
}
document.querySelectorAll('.dot')[0].classList.add('active');
resetTimer();
</script>
</body>
</html>
