<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">

<title>大会運営速報</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { width:100%; height:100%; background:#111; overflow:hidden; font-family:'Meiryo',sans-serif; }
  .header { position:fixed; top:0; left:0; right:0; height:60px; background:rgba(0,0,0,.85); display:flex; align-items:center; justify-content:space-between; padding:0 16px; gap:12px; z-index:10; }
  .header-left { display:flex; align-items:center; gap:8px; flex-shrink:0; }
  .header-title { color:#f0c040; font-size:15px; white-space:nowrap; }
  .header-info  { color:#888; font-size:11px; white-space:nowrap; }
  .header-nav { display:flex; align-items:center; gap:10px; flex-shrink:0; }
  .slide { position:fixed; top:60px; left:0; right:0; bottom:0; display:none; align-items:flex-start; justify-content:center; background:#111; overflow-y:auto; }
  .slide.active { display:flex; }
  .slide img { width:100%; height:auto; display:block; }
  .dot { width:10px; height:10px; background:#555; border-radius:50%; cursor:pointer; display:inline-block; }
  .dot.active { background:#f0c040; }
  .nav-btn { background:#f0c040; color:#111; border:none; padding:8px 28px; font-size:18px; font-weight:bold; cursor:pointer; border-radius:8px; }
  .nav-btn:hover { background:#ffd700; }
  #toggleBtn { padding:8px 14px; font-size:14px; border-radius:8px; border:none; font-weight:bold; cursor:pointer; min-width:120px; }
  #toggleBtn.auto { background:#4caf50; color:#fff; }
  #toggleBtn.manual { background:#888; color:#fff; }
  .page-info { color:#f0c040; font-size:15px; font-weight:bold; min-width:60px; text-align:center; }
</style>
</head>
<body>
<div class="header">
  <div class="header-left">
    <button id="toggleBtn" class="auto" onclick="toggleRefresh()">🔄 自動更新 ON</button>
    <button id="reloadBtn" style="display:none;background:#e64a19;color:#fff;border:none;padding:8px 14px;font-size:14px;font-weight:bold;cursor:pointer;border-radius:8px;" onclick="location.href=location.pathname+'?manual=1'">⟳ 今すぐ更新</button>
  </div>
  <div class="header-nav">
    <button class="nav-btn" onclick="prev()">◀ 前へ</button>
    <span class="page-info" id="pi">1 / 10</span>
    <span class='dot' onclick='goTo(0)'></span>
<span class='dot' onclick='goTo(1)'></span>
<span class='dot' onclick='goTo(2)'></span>
<span class='dot' onclick='goTo(3)'></span>
<span class='dot' onclick='goTo(4)'></span>
<span class='dot' onclick='goTo(5)'></span>
<span class='dot' onclick='goTo(6)'></span>
<span class='dot' onclick='goTo(7)'></span>
<span class='dot' onclick='goTo(8)'></span>
<span class='dot' onclick='goTo(9)'></span>

    <button class="nav-btn" onclick="next()">次へ ▶</button>
  </div>
  <div class="header-left">
    <span class="header-title">大会運営速報システム　保手濱モデル</span>
    <span class="header-info">更新：2026年06月21日 14:12:44</span>
  </div>
</div>
<div class='slide'><img src='img/0_①男子2026呉市長杯争奪卓球大会_結果101.png?t=20260621141244' alt='結果101' /></div>
<div class='slide'><img src='img/1_①男子2026呉市長杯争奪卓球大会_結果103.png?t=20260621141244' alt='結果103' /></div>
<div class='slide'><img src='img/2_①男子2026呉市長杯争奪卓球大会_結果105.png?t=20260621141244' alt='結果105' /></div>
<div class='slide'><img src='img/3_①男子2026呉市長杯争奪卓球大会_結果107.png?t=20260621141244' alt='結果107' /></div>
<div class='slide'><img src='img/4_①男子2026呉市長杯争奪卓球大会_結果109.png?t=20260621141244' alt='結果109' /></div>
<div class='slide'><img src='img/5_②女子2026呉市長杯争奪卓球大会_結果102.png?t=20260621141244' alt='結果102' /></div>
<div class='slide'><img src='img/6_②女子2026呉市長杯争奪卓球大会_結果104.png?t=20260621141244' alt='結果104' /></div>
<div class='slide'><img src='img/7_②女子2026呉市長杯争奪卓球大会_結果106.png?t=20260621141244' alt='結果106' /></div>
<div class='slide'><img src='img/8_②女子2026呉市長杯争奪卓球大会_結果108.png?t=20260621141244' alt='結果108' /></div>
<div class='slide'><img src='img/9_②女子2026呉市長杯争奪卓球大会_結果10A.png?t=20260621141244' alt='結果10A' /></div>

<script>
var c=0,t=10;
var autoRefresh=true;
var slideTimer=null;

function startSlideTimer(){
  clearInterval(slideTimer);
  slideTimer=setInterval(function(){
    if(c>=t-1){
      // 最終ページ → 自動更新（先頭から再スタート）
      location.href=location.pathname;
    } else {
      goTo(c+1);
    }
  },10000);
}

function stopSlideTimer(){
  clearInterval(slideTimer);
  slideTimer=null;
}

// リロード後も手動モードを維持
if(new URLSearchParams(location.search).get('manual')==='1'){
  autoRefresh=false;
  var tb=document.getElementById('toggleBtn');
  tb.textContent='⏸ 手動更新'; tb.className='manual';
  document.getElementById('reloadBtn').style.display='';
} else {
  startSlideTimer();
}

function toggleRefresh(){
  autoRefresh=!autoRefresh;
  var btn=document.getElementById('toggleBtn');
  if(autoRefresh){
    startSlideTimer();
    btn.textContent='🔄 自動更新 ON';
    btn.className='auto';
    document.getElementById('reloadBtn').style.display='none';
  } else {
    stopSlideTimer();
    btn.textContent='⏸ 手動更新';
    btn.className='manual';
    document.getElementById('reloadBtn').style.display='';
  }
}
function goTo(n){
  document.querySelectorAll('.slide')[c].classList.remove('active');
  document.querySelectorAll('.dot')[c].classList.remove('active');
  c=(n+t)%t;
  document.querySelectorAll('.slide')[c].classList.add('active');
  document.querySelectorAll('.dot')[c].classList.add('active');
  document.getElementById('pi').textContent=(c+1)+' / '+t;
}
function next(){goTo(c+1);}
function prev(){goTo(c-1);}
document.querySelectorAll('.slide')[0].classList.add('active');
document.querySelectorAll('.dot')[0].classList.add('active');
</script>
</body>
</html>
